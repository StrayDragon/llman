description: llman SDD apply prompt A/B evaluation (baseline vs candidate)

commandLineOptions:
  grader: openai:chat:gpt-5.2

providers:
  - __PROVIDERS__

prompts:
  - file://prompts/baseline.yaml
  - file://prompts/candidate.yaml

tests: file://tests.yaml

defaultTest:
  assert:
    - type: llm-rubric
      value: |
        {{ rubric }}
      threshold: 0.75
