# yaml-language-server: $schema=https://raw.githubusercontent.com/StrayDragon/llman/main/artifacts/schema/configs/en/llmanspec-config.schema.json
schema: spec-driven
locale: zh-CN

context: |
  Project conventions: see AGENTS.md (SSOT).
  Current state (2026-06-10): c05-rebuild-core completed — adk-rust fully removed, self-owned XyModel/XyTool/XyRunner ReAct loop with 7 built-in tools, hooks, session, and CLI.
  c06-update-bdd-framework: cucumber-rs → rstest-bdd migration completed.
  c07-fix-bdd-scenarios: all 77 BDD scenarios passing.
  Design principle: pluggable/configurable architecture. Core (agent loop + tools + provider + CLI) is always present; built-in enhancements (hooks, security, repeat detection) are runtime-toggled; everything else (LSP, DAP, skills, MCP, diff review, session snapshots, planning) is opt-in via feature flag.
  Dependency tracking: each proposal.md frontmatter contains depends_on. Read proposal.md files to determine execution order. For DAG visualization run: llman sdd graph

bdd:
  framework: rstest-bdd
  feature_dir: tests/features
  default_language: zh-CN
  run_command: "cargo test --test bdd -- --test-threads=1"
  verify_prompt: "Each scenario in the feature file MUST be mapped to an implemented step definition. Run `cargo test --test bdd` to confirm all scenarios pass."

rules:
  proposal:
    - "Change ID format: c{priority}-{verb}-{subject} where priority is a multiple of 5 (e.g., c05-add-skeleton, c10-add-config, c15-add-tools). Verb prefix: add / update / remove / refactor / fix. Priority numbers MUST be unique."
    - "Priority numbers are advisory ordering. Actual execution follows dependency edges first, then priority as tiebreaker. To insert between c05 and c10, use c06/c07/c08/c09."
    - "Every proposal.md MUST include YAML frontmatter with depends_on (list of change IDs). Use [] if none."
    - "A change cannot be applied until all its depends_on changes have been archived (moved to changes/archive/)."
    - "If depends_on references a change that does not exist in llmanspec/changes/, treat as validation error and STOP."
    - "Keep changes atomic: each change must be independently validatable and archivable."
    - "Prefer pluggable/configurable design: features beyond core agent loop + basic tools should be opt-in via config or feature flag, not hard-coded."
    - "Spec naming: spec directory names MUST be domain nouns describing WHAT the spec governs, not actions. Examples: runtime-config (not add-config), tool-system (not add-tools), agent-runtime (not add-agent-loop). Use hyphenated lowercase noun phrases."
  tasks:
    - "Break tasks into chunks of max 2 hours."
