repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^artifacts/schema/
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]
  - repo: local
    hooks:
      - id: just-check-all
        name: just check-all
        entry: just check-all
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy -- -D warnings
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: schema-generate
        name: llman schema generate
        entry: bash -c 'LLMAN_CONFIG_DIR=./artifacts/testing_config_home cargo run -- self schema generate && git add artifacts/schema/'
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: check-skills-version
        name: check skills version
        entry: python3 scripts/check-skills-version.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
